<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(title='Skills and Interests - Student Portfolio', content=~{::section})}">
<body>
    <section>
        <div class="text-container">
            <h2 class="section-title">Skills & Interests</h2>
            
            <div class="skills-container">
                <div class="skills-group">
                    <h3>Programming Stack</h3>
                    <div class="skills-grid">
                        <div class="skill-item">
                            <div class="skill-icon">☕</div>
                            <span>Java</span>
                        </div>
                        <div class="skill-item">
                            <div class="skill-icon">🌐</div>
                            <span>HTML5</span>
                        </div>
                        <div class="skill-item">
                            <div class="skill-icon">🎨</div>
                            <span>CSS3</span>
                        </div>
                        <div class="skill-item">
                            <div class="skill-icon">📜</div>
                            <span>JavaScript</span>
                        </div>
                    </div>
                </div>

                <div class="skills-group" style="margin-top: 4rem;">
                    <h3>Personal Interests</h3>
                    <div class="skills-grid">
                        <div class="skill-item">
                            <div class="skill-icon">🎮</div>
                            <span>Gaming</span>
                        </div>
                        <div class="skill-item">
                            <div class="skill-icon">📷</div>
                            <span>Photography</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
