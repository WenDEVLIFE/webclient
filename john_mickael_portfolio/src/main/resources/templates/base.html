<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Portfolio</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-container text-container">
            <a href="/" class="logo">JOHN MICHAEL</a>
            <div class="nav-links">
                <a href="/" th:classappend="${currentUri == '/' ? 'active' : ''}">Home</a>
                <a href="/about" th:classappend="${currentUri == '/about' ? 'active' : ''}">About</a>
                <a href="/journey" th:classappend="${currentUri == '/journey' ? 'active' : ''}">Journey</a>
                <a href="/skills" th:classappend="${currentUri == '/skills' ? 'active' : ''}">Skills</a>
                <a href="/gallery" th:classappend="${currentUri == '/gallery' ? 'active' : ''}">Gallery</a>
            </div>
        </div>
    </nav>

    <main th:insert="${content}">
        <!-- Content will be inserted here -->
    </main>

    <footer>
        <p>&copy; 2026 Student Life Portfolio. Created with Spring Boot & Thymeleaf.</p>
    </footer>
</body>
</html>
