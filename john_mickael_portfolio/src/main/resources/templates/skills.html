<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(title='Skills and Interests - Student Portfolio', content=~{::section})}">

                    <div class="skills-grid">

                            <span class="skill-icon">⌨️</span>

                        </div>
                        <div class="skill-item">
                            <span class="skill-icon">🌐</span>

                    <div class="skills-grid">
                        <div class="skill-item">
                            <div class="skill-icon">🎬</div>

                        <div class="skill-item">
                            <div class="skill-icon">🎮</div>

                            <div class="skill-icon">🎵</div>

</html>
